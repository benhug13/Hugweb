version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      # Alle harmlosen Updates in EINEN PR buendeln statt 10 einzelne
      minor-und-patch:
        update-types:
          - "minor"
          - "patch"
    commit-message:
      prefix: "deps"
